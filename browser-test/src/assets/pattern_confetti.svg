<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <pattern id="confetti" patternUnits="userSpaceOnUse" width="50" height="50">
      <circle cx="10" cy="10" r="5" fill="red" />
      <circle cx="30" cy="20" r="5" fill="blue" />
      <rect x="20" y="30" width="10" height="10" fill="green" />
      <polygon points="40,10 45,20 35,20" fill="yellow" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#confetti)" />
</svg>